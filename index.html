<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TenseMaster - Học 3 thì hiện tại</title>
    
    <!-- Thư viện hỗ trợ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FFFBEB; }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(245, 158, 11, 0.15); }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <p class="text-amber-600 font-bold animate-pulse">Đang nạp dữ liệu và tính năng ôn tập...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Biểu tượng SVG trực tiếp
        const Icons = {
            Book: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>,
            Home: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Trophy: () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>,
            History: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>
        };

        const tests = [
          {
            id: 'test-1',
            title: 'ĐỀ THI SỐ 1: KIẾN THỨC CĂN BẢN',
            description: 'Tập trung vào các dấu hiệu nhận biết cơ bản của 3 thì hiện tại.',
            questions: [
              { id: '1-1', text: 'I (play) __________ football every Saturday.', correctAnswer: 'play', explanation: 'Dấu hiệu "every Saturday" chỉ thói quen, dùng Hiện tại đơn.', tense: 'Hiện tại đơn', type: 'choice', options: ['play', 'plays', 'am playing'] },
              { id: '1-2', text: 'She (have) __________ a pen.', correctAnswer: 'has', explanation: 'Chủ ngữ "She" số ít, động từ "have" chuyển thành "has".', tense: 'Hiện tại đơn', type: 'choice', options: ['have', 'has', 'is having'] },
              { id: '1-3', text: '(you / like) __________ chocolate?', correctAnswer: 'Do you like', explanation: 'Câu hỏi sở thích ở Hiện tại đơn, mượn trợ động từ "Do".', tense: 'Hiện tại đơn', type: 'choice', options: ['Do you like', 'Does you like', 'Are you liking'] },
              { id: '1-4', text: 'Look! The bus (come) __________.', correctAnswer: 'is coming', explanation: 'Dấu hiệu "Look!" báo hiệu hành động đang diễn ra.', tense: 'Hiện tại tiếp diễn', type: 'choice', options: ['comes', 'is coming', 'has come'] },
              { id: '1-5', text: 'Listen! Someone (sing) __________ in the bathroom.', correctAnswer: 'is singing', explanation: 'Dấu hiệu "Listen!" báo hiệu hành động đang diễn ra.', tense: 'Hiện tại tiếp diễn', type: 'choice', options: ['sings', 'is singing', 'has sung'] },
              { id: '1-6', text: 'She (not / study) __________ at the moment; she is watching TV.', correctAnswer: 'is not studying', explanation: 'Dấu hiệu "at the moment" dùng Hiện tại tiếp diễn phủ định.', tense: 'Hiện tại tiếp diễn', type: 'choice', options: ['does not study', 'is not studying', 'has not studied'] },
              { id: '1-7', text: 'The sun (set) __________ in the West.', correctAnswer: 'sets', explanation: 'Sự thật hiển nhiên luôn đúng, dùng Hiện tại đơn.', tense: 'Hiện tại đơn', type: 'choice', options: ['set', 'sets', 'is setting'] },
              { id: '1-8', text: 'Water (boil) __________ at 100 degrees Celsius.', correctAnswer: 'boils', explanation: 'Sự thật vật lý, dùng Hiện tại đơn.', tense: 'Hiện tại đơn', type: 'choice', options: ['boil', 'boils', 'is boiling'] },
              { id: '1-9', text: 'I (see) __________ the new bridge.', correctAnswer: 'have seen', explanation: 'Thì Hiện tại hoàn thành diễn tả hành động vừa xảy ra.', tense: 'Hiện tại hoàn thành', type: 'choice', options: ['see', 'am seeing', 'have seen'] },
              { id: '1-10', text: '(you / ever / eat) __________ Sushi?', correctAnswer: 'Have you ever eaten', explanation: 'Hỏi về trải nghiệm (đã từng chưa), dùng Hiện tại hoàn thành.', tense: 'Hiện tại hoàn thành', type: 'choice', options: ['Do you ever eat', 'Are you ever eating', 'Have you ever eaten'] },
              { id: '1-11', text: 'They (lose) __________ their keys.', correctAnswer: 'have lost', explanation: '"They" số nhiều đi với "have", diễn tả sự việc vừa mới xảy ra.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '1-12', text: 'Bo (drive) __________ Rose to work today.', correctAnswer: 'has driven', explanation: '"Bo" số ít đi với "has", diễn tả việc xảy ra trong ngày "today".', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '1-13', text: 'I (not / hear) __________ from you for ages.', correctAnswer: 'haven’t heard', explanation: 'Dấu hiệu "for ages" (đã lâu lắm rồi) dùng Hiện tại hoàn thành.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '1-14', text: 'My mother often (teach) __________ me English on Saturday evenings.', correctAnswer: 'teaches', explanation: 'Dấu hiệu "often" chỉ thói quen, chủ ngữ số ít thêm "es".', tense: 'Hiện tại đơn', type: 'fill' },
              { id: '1-15', text: 'The cat (not / like) __________ me.', correctAnswer: 'doesn’t like', explanation: 'Câu phủ định Hiện tại đơn, "The cat" số ít mượn "doesn\'t".', tense: 'Hiện tại đơn', type: 'fill' },
              { id: '1-16', text: 'How many books / Bob / read? (Hiện tại hoàn thành)', correctAnswer: 'Has Bob read?', explanation: 'Câu hỏi Hiện tại hoàn thành: Have/Has + S + V3?.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '1-17', text: 'Look! It (snow) __________ outside.', correctAnswer: 'is snowing', explanation: 'Dấu hiệu "Look!" bắt buộc dùng Hiện tại tiếp diễn.', tense: 'Hiện tại tiếp diễn', type: 'fill' },
              { id: '1-18', text: 'I (not / work) __________ today. (Hiện tại hoàn thành)', correctAnswer: 'have not worked', explanation: 'Hiện tại hoàn thành diễn tả hành động trong ngày chưa xong.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '1-19', text: 'She (not / come) __________ here for a long time.', correctAnswer: "hasn't come", explanation: 'Dấu hiệu "for a long time" dùng Hiện tại hoàn thành.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '1-20', text: 'Where (be / you)? (Hiện tại hoàn thành)', correctAnswer: 'Have you been', explanation: 'Câu hỏi nơi chốn (đã ở đâu) ở Hiện tại hoàn thành.', tense: 'Hiện tại hoàn thành', type: 'fill' }
            ]
          },
          {
            id: 'test-2',
            title: 'ĐỀ THI SỐ 2: PHÂN BIỆT CÁC THÌ HIỆN TẠI',
            description: 'Tập trung vào việc lựa chọn thì đúng dựa trên ngữ cảnh cụ thể.',
            questions: [
              { id: '2-1', text: 'My brother (finish) __________ work at 8 p.m.', correctAnswer: 'finishes', explanation: 'Thói quen hàng ngày, chủ ngữ số ít thêm "es".', tense: 'Hiện tại đơn', type: 'choice', options: ['finish', 'finishes', 'is finishing'] },
              { id: '2-2', text: 'We (go) __________ to the cinema every Sunday.', correctAnswer: 'go', explanation: 'Dấu hiệu "every Sunday", Hiện tại đơn đi với chủ ngữ "We".', tense: 'Hiện tại đơn', type: 'choice', options: ['go', 'goes', 'are going'] },
              { id: '2-3', text: 'Be quiet! The baby (sleep) __________.', correctAnswer: 'is sleeping', explanation: 'Dấu hiệu "Be quiet!" chỉ hành động đang diễn ra.', tense: 'Hiện tại tiếp diễn', type: 'choice', options: ['sleeps', 'is sleeping', 'has slept'] },
              { id: '2-4', text: '(he / drive) __________ to work every day?', correctAnswer: 'Does he drive', explanation: 'Câu hỏi "every day", dùng Hiện tại đơn mượn "Does".', tense: 'Hiện tại đơn', type: 'choice', options: ['Does he drive', 'Is he driving', 'Has he driven'] },
              { id: '2-5', text: 'It (not / rain) __________ now, so we can go out.', correctAnswer: 'is not raining', explanation: 'Dấu hiệu "now", dùng Hiện tại tiếp diễn phủ định.', tense: 'Hiện tại tiếp diễn', type: 'choice', options: ['doesn\'t rain', 'is not raining', 'has not rained'] },
              { id: '2-6', text: 'Normally I (wear) __________ glasses, but now I (wear) __________ contact lenses.', correctAnswer: 'wear / am wearing', explanation: '"Normally" (thói quen - HT đơn) vs "now" (tạm thời - HT tiếp diễn).', tense: 'Hiện tại tiếp diễn', type: 'choice', options: ['wear / wear', 'wear / am wearing', 'am wearing / wear'] },
              { id: '2-7', text: 'My sister (wash) __________ the dishes every day.', correctAnswer: 'washes', explanation: 'Dấu hiệu "every day", thói quen ở Hiện tại đơn.', tense: 'Hiện tại đơn', type: 'choice', options: ['wash', 'washes', 'is washing'] },
              { id: '2-8', text: 'What (you / do) __________ right now?', correctAnswer: 'are you doing', explanation: 'Dấu hiệu "right now" dùng câu hỏi Hiện tại tiếp diễn.', tense: 'Hiện tại tiếp diễn', type: 'choice', options: ['do you do', 'are you doing', 'have you done'] },
              { id: '2-9', text: 'They (leave) __________ London this month.', correctAnswer: 'have left', explanation: 'Sự việc xảy ra trong tháng này "this month".', tense: 'Hiện tại hoàn thành', type: 'choice', options: ['leave', 'are leaving', 'have left'] },
              { id: '2-10', text: 'Jenny (lock) __________ the door? (Hiện tại hoàn thành)', correctAnswer: 'Has Jenny locked', explanation: 'Câu hỏi Hiện tại hoàn thành: Has + S + V3?.', tense: 'Hiện tại hoàn thành', type: 'choice', options: ['Does Jenny lock', 'Is Jenny locking', 'Has Jenny locked'] },
              { id: '2-11', text: 'Walter (call) __________ us? (Hiện tại hoàn thành)', correctAnswer: 'Has Walter called', explanation: 'Câu hỏi Hiện tại hoàn thành cho chủ ngữ số ít.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '2-12', text: 'He (be) __________ to England.', correctAnswer: 'has been', explanation: 'Diễn tả trải nghiệm đã từng đến nơi nào đó.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '2-13', text: 'I (forget) __________ your name.', correctAnswer: 'have forgotten', explanation: 'Kết quả của hành động kéo dài đến hiện tại.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '2-14', text: 'School (not / start) __________ yet.', correctAnswer: "hasn't started", explanation: 'Dấu hiệu "yet" dùng trong câu phủ định Hiện tại hoàn thành.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '2-15', text: '(speak / he) __________ to his boss? (Hiện tại hoàn thành)', correctAnswer: 'Has he spoken', explanation: 'Câu hỏi về hành động vừa mới xảy ra hoặc chưa xảy ra.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '2-16', text: 'The last time we met was 2 years ago. -> We haven’t _______________.', correctAnswer: 'met for 2 years', explanation: 'Chuyển từ Quá khứ đơn sang Hiện tại hoàn thành phủ định + for.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '2-17', text: 'He started working as a teacher 6 months ago. -> He has _______________.', correctAnswer: 'worked as a teacher for 6 months', explanation: 'Chuyển mốc thời gian "ago" sang khoảng thời gian "for".', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '2-18', text: 'Mary / visit / his grandparents. (Khẳng định Hiện tại hoàn thành)', correctAnswer: 'Mary has visited...', explanation: 'Cấu trúc khẳng định: S + have/has + V3.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '2-19', text: 'Sửa lỗi: Jinho have lost his key. He can’t find it anywhere.', correctAnswer: 'has', explanation: 'Chủ ngữ "Jinho" số ít nên dùng trợ động từ "has".', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '2-20', text: 'Sửa lỗi: I am not believing his story.', correctAnswer: 'do not believe', explanation: '"Believe" là động từ trạng thái, không dùng ở tiếp diễn.', tense: 'Hiện tại đơn', type: 'fill' }
            ]
          },
          {
            id: 'test-3',
            title: 'ĐỀ THI SỐ 3: TỔNG HỢP VÀ NÂNG CAO',
            description: 'Bài kiểm tra tổng hợp kiến thức từ cả 3 thì hiện tại.',
            questions: [
              { id: '3-1', text: 'Police (catch) __________ robbers.', correctAnswer: 'catch', explanation: 'Chủ ngữ "Police" (Cảnh sát) được coi là số nhiều trong ngữ cảnh này.', tense: 'Hiện tại đơn', type: 'choice', options: ['catch', 'catches', 'are catching'] },
              { id: '3-2', text: 'My dad (work) __________ in a bank, but today he is at home.', correctAnswer: 'works', explanation: 'Sự thật về nghề nghiệp ổn định, dùng Hiện tại đơn.', tense: 'Hiện tại đơn', type: 'choice', options: ['work', 'works', 'is working'] },
              { id: '3-3', text: '(your parents / watch) __________ TV in the evening usually?', correctAnswer: 'Do your parents watch', explanation: 'Câu hỏi thói quen "usually", dùng Hiện tại đơn.', tense: 'Hiện tại đơn', type: 'choice', options: ['Do your parents watch', 'Does your parents watch', 'Are your parents watching'] },
              { id: '3-4', text: 'I (read) __________ a very interesting book right now.', correctAnswer: 'am reading', explanation: 'Dấu hiệu "right now", hành động đang diễn ra.', tense: 'Hiện tại tiếp diễn', type: 'choice', options: ['read', 'am reading', 'have read'] },
              { id: '3-5', text: 'I (not / know) __________ the answer to this question.', correctAnswer: 'do not know', explanation: '"Know" là động từ trạng thái, chỉ dùng Hiện tại đơn.', tense: 'Hiện tại đơn', type: 'choice', options: ['do not know', 'am not knowing', 'have not known'] },
              { id: '3-6', text: 'How often __________ to the gym? (A. do you go | B. are you going)', correctAnswer: 'do you go', explanation: '"How often" hỏi tần suất, dùng Hiện tại đơn.', tense: 'Hiện tại đơn', type: 'choice', options: ['do you go', 'are you going'] },
              { id: '3-7', text: 'The Earth __________ around the Sun. (A. is going | B. goes)', correctAnswer: 'goes', explanation: 'Sự thật hiển nhiên trong vũ trụ, dùng Hiện tại đơn.', tense: 'Hiện tại đơn', type: 'choice', options: ['is going', 'goes'] },
              { id: '3-8', text: '(she / be) __________ a singer?', correctAnswer: 'Is she', explanation: 'Câu hỏi với động từ To be ở Hiện tại đơn.', tense: 'Hiện tại đơn', type: 'choice', options: ['Is she', 'Does she', 'Has she'] },
              { id: '3-9', text: 'My life __________ so boring. I just watch TV every night.', correctAnswer: 'is', explanation: 'Miêu tả trạng thái hiện tại, dùng Hiện tại đơn của To be.', tense: 'Hiện tại đơn', type: 'choice', options: ['is', 'am', 'are'] },
              { id: '3-10', text: 'They (not / plan) __________ our holiday yet.', correctAnswer: 'have not planned', explanation: 'Dấu hiệu "yet", dùng Hiện tại hoàn thành phủ định.', tense: 'Hiện tại hoàn thành', type: 'choice', options: ['do not plan', 'are not planning', 'have not planned'] },
              { id: '3-11', text: 'I’m afraid he has __________ gone out (just / yet / already).', correctAnswer: 'just', explanation: '"Just" dùng để chỉ hành động vừa mới xảy ra.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '3-12', text: 'I haven’t finished __________ (just / yet / already).', correctAnswer: 'yet', explanation: '"Yet" thường đứng cuối câu phủ định để chỉ việc chưa xong.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '3-13', text: 'I’ve __________ done it (just / yet / already).', correctAnswer: 'already', explanation: '"Already" dùng để nhấn mạnh việc đã hoàn thành rồi.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '3-14', text: 'Have you __________ been to New York? (ever / never)', correctAnswer: 'ever', explanation: '"Ever" dùng trong câu hỏi về trải nghiệm "đã từng chưa".', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '3-15', text: 'She (not / receive) __________ any good news for a long time.', correctAnswer: "hasn't received", explanation: 'Dấu hiệu "for a long time" dùng Hiện tại hoàn thành.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '3-16', text: 'What is your job? -> What __________ you __________?', correctAnswer: 'do you do', explanation: 'Cách hỏi nghề nghiệp tương đương "What is your job?".', tense: 'Hiện tại đơn', type: 'fill' },
              { id: '3-17', text: 'It is her habit to check emails before breakfast. (Dùng usually)', correctAnswer: 'She usually checks...', explanation: '"Habit" (thói quen) thay bằng trạng từ "usually" + HT đơn.', tense: 'Hiện tại đơn', type: 'fill' },
              { id: '3-18', text: 'This is the first time I had such an exciting trip. -> I have never __________.', correctAnswer: 'never had such...', explanation: 'Cấu trúc: This is the first time... = I have never... before.', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '3-19', text: 'Sửa lỗi: The lesson haven’t started yet.', correctAnswer: "hasn't", explanation: '"The lesson" là danh từ số ít, dùng "hasn\'t".', tense: 'Hiện tại hoàn thành', type: 'fill' },
              { id: '3-20', text: 'Sửa lỗi: Does she working here?', correctAnswer: 'Is', explanation: 'Vì có đuôi "-ing" (working) nên phải dùng To be "Is"', tense: 'Hiện tại tiếp diễn', type: 'fill' }
            ]
          }
        ];

        function App() {
            const [view, setView] = useState('home');
            const [currentTest, setCurrentTest] = useState(null);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answer, setAnswer] = useState('');
            const [isAnswered, setIsAnswered] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);
            const [stats, setStats] = useState({ correct: 0, wrong: 0 });
            
            // Quản lý câu sai
            const [wrongIds, setWrongIds] = useState(() => {
                const saved = localStorage.getItem('wrong_questions');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                localStorage.setItem('wrong_questions', JSON.stringify(wrongIds));
            }, [wrongIds]);

            const startTest = (test) => {
                setCurrentTest(test);
                setCurrentIdx(0);
                setAnswer('');
                setIsAnswered(false);
                setStats({ correct: 0, wrong: 0 });
                setView('test');
            };

            const startReview = () => {
                const allQs = tests.flatMap(t => t.questions);
                const reviewQs = allQs.filter(q => wrongIds.includes(q.id));
                if (reviewQs.length === 0) return;
                startTest({
                    id: 'review',
                    title: 'ÔN TẬP CÁC CÂU SAI',
                    description: 'Luyện tập lại những câu bạn đã từng làm chưa đúng.',
                    questions: reviewQs
                });
            };

            const normalize = (s) => s.trim().toLowerCase().replace(/[’‘´`]/g, "'").replace(/\s+/g, ' ');

            const handleCheck = () => {
                if (isAnswered) return;
                const q = currentTest.questions[currentIdx];
                const u = normalize(answer);
                const c = normalize(q.correctAnswer);
                const correct = u === c;
                
                setIsCorrect(correct);
                setIsAnswered(true);

                if (correct) {
                    setStats(p => ({ ...p, correct: p.correct + 1 }));
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                    // Xóa khỏi danh sách sai nếu làm đúng
                    setWrongIds(prev => prev.filter(id => id !== q.id));
                } else {
                    setStats(p => ({ ...p, wrong: p.wrong + 1 }));
                    // Thêm vào danh sách sai
                    if (!wrongIds.includes(q.id)) setWrongIds(prev => [...prev, q.id]);
                }
            };

            const next = () => {
                if (currentIdx < currentTest.questions.length - 1) {
                    setCurrentIdx(p => p + 1);
                    setAnswer(''); setIsAnswered(false);
                } else { setView('result'); }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-2xl mx-auto mb-8 flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-amber-100">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                            <div className="bg-amber-400 p-2 rounded-lg text-white"><Icons.Book /></div>
                            <h1 className="font-bold text-xl text-amber-900">TenseMaster</h1>
                        </div>
                        {view !== 'home' && <button onClick={() => setView('home')} className="text-amber-700 font-medium flex items-center gap-1"><Icons.Home /> Trang chủ</button>}
                    </header>

                    <main className="max-w-2xl mx-auto">
                        {view === 'home' && (
                            <div className="space-y-6">
                                <div className="text-center py-6">
                                    <h2 className="text-3xl font-extrabold text-slate-900 mb-2">Chào mừng bạn! 👋</h2>
                                    <p className="text-slate-500">Chọn bài tập để bắt đầu ôn luyện ngay.</p>
                                </div>
                                <div className="grid gap-4">
                                    {tests.map(test => (
                                        <button key={test.id} onClick={() => startTest(test)} className="bg-white p-6 rounded-3xl border-2 border-amber-100 hover:border-amber-400 transition-all text-left flex justify-between items-center group">
                                            <div>
                                                <h3 className="font-bold text-lg text-slate-800 group-hover:text-amber-600">{test.title}</h3>
                                                <p className="text-sm text-slate-500">{test.description}</p>
                                            </div>
                                            <div className="text-amber-300 group-hover:text-amber-500"><Icons.ChevronRight /></div>
                                        </button>
                                    ))}

                                    {wrongIds.length > 0 && (
                                        <button onClick={startReview} className="bg-rose-50 p-6 rounded-3xl border-2 border-rose-100 hover:border-rose-400 transition-all text-left flex justify-between items-center group">
                                            <div>
                                                <div className="flex items-center gap-2 mb-1">
                                                    <div className="text-rose-500"><Icons.History /></div>
                                                    <h3 className="font-bold text-lg text-rose-800">Ôn tập câu sai</h3>
                                                </div>
                                                <p className="text-sm text-rose-600">Bạn đang có {wrongIds.length} câu cần luyện tập lại.</p>
                                            </div>
                                            <div className="text-rose-300 group-hover:text-rose-500"><Icons.ChevronRight /></div>
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'test' && currentTest && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 md:p-8 rounded-[2rem] card-shadow border border-amber-50">
                                    <div className="mb-6 flex justify-between items-center text-xs font-bold text-amber-600 uppercase tracking-widest">
                                        <span>Câu {currentIdx + 1} / {currentTest.questions.length}</span>
                                        <span className="bg-amber-100 px-2 py-1 rounded">{currentTest.questions[currentIdx].tense}</span>
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-800 mb-8 leading-relaxed">{currentTest.questions[currentIdx].text}</h3>
                                    <div className="space-y-4">
                                        {currentTest.questions[currentIdx].type === 'choice' ? (
                                            <div className="grid gap-3">
                                                {currentTest.questions[currentIdx].options.map(opt => (
                                                    <button key={opt} disabled={isAnswered} onClick={() => setAnswer(opt)} className={`p-4 rounded-2xl border-2 text-left transition-all ${answer === opt ? 'border-amber-400 bg-amber-50' : 'border-slate-100'} ${isAnswered && opt === currentTest.questions[currentIdx].correctAnswer ? 'border-emerald-400 bg-emerald-50' : ''}`}>{opt}</button>
                                                ))}
                                            </div>
                                        ) : (
                                            <input type="text" value={answer} disabled={isAnswered} onChange={e => setAnswer(e.target.value)} placeholder="Nhập đáp án..." className="w-full p-4 rounded-2xl border-2 border-amber-100 outline-none focus:border-amber-400 text-lg" onKeyDown={e => e.key === 'Enter' && handleCheck()} />
                                        )}
                                        {!isAnswered ? (
                                            <button onClick={handleCheck} disabled={!answer.trim()} className="w-full py-4 bg-amber-400 text-white font-bold rounded-2xl shadow-lg hover:bg-amber-500 transition-all mt-4">Kiểm tra</button>
                                        ) : (
                                            <div className={`p-6 rounded-2xl border-2 mt-4 ${isCorrect ? 'bg-emerald-50 border-emerald-100' : 'bg-rose-50 border-rose-100'}`}>
                                                <div className="flex gap-3 mb-2">
                                                    <div className={isCorrect ? 'text-emerald-500' : 'text-rose-500'}>{isCorrect ? <Icons.Check /> : <Icons.X />}</div>
                                                    <p className="font-bold text-lg">{isCorrect ? 'Chính xác! 🎉' : `Sai rồi. Đáp án: ${currentTest.questions[currentIdx].correctAnswer}`}</p>
                                                </div>
                                                <p className="text-sm text-slate-600 italic mb-4">{currentTest.questions[currentIdx].explanation}</p>
                                                <button onClick={next} className="w-full py-3 bg-slate-800 text-white font-bold rounded-xl flex justify-center items-center gap-2">Tiếp theo</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'result' && (
                            <div className="text-center bg-white p-10 rounded-[3rem] card-shadow border border-amber-50">
                                <div className="flex justify-center text-amber-500 mb-4"><Icons.Trophy /></div>
                                <h2 className="text-3xl font-black mb-6 text-slate-900">Kết quả bài làm</h2>
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="bg-emerald-50 p-6 rounded-2xl border border-emerald-100"><p className="text-emerald-600 text-xs font-bold mb-1">ĐÚNG</p><p className="text-3xl font-black text-emerald-700">{stats.correct}</p></div>
                                    <div className="bg-rose-50 p-6 rounded-2xl border border-rose-100"><p className="text-rose-600 text-xs font-bold mb-1">SAI</p><p className="text-3xl font-black text-rose-700">{stats.wrong}</p></div>
                                </div>
                                <button onClick={() => setView('home')} className="w-full py-4 bg-amber-400 text-white font-bold rounded-2xl shadow-lg hover:bg-amber-500 transition-all">Quay lại trang chủ</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
